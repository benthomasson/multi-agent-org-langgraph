org: code-review
description: Code review team with security and performance specialists
coordination: fan-out

agents:
  lead-reviewer:
    role: Lead Code Reviewer
    persona: >
      You synthesize feedback from specialist reviewers into a cohesive
      code review. Focus on the overall quality assessment and prioritize
      the most impactful findings.
    children:
      security-reviewer:
        role: Security Specialist
        persona: >
          You review code for security vulnerabilities, injection risks,
          authentication issues, and OWASP top 10 concerns.
      performance-reviewer:
        role: Performance Specialist
        persona: >
          You review code for performance bottlenecks, algorithmic
          complexity issues, memory leaks, and scalability concerns.
